        <!-- Formulaire -->
        <h1>Envoyer un message</h1>
        <div class="carte">
            <div class="champ">
                <label>Votre nom</label>
                <input type="text" id="nom" placeholder="Entrez votre nom">
            </div>
            <div class="champ">
                <label>Votre email</label>
                <input type="email" id="email" placeholder="Entrez votre email">
            </div>
            <div class="champ">
                <label>Votre message</label>
                <textarea id="message" placeholder="Écrivez votre message ici..." rows="5"></textarea>
            </div>

            <!-- Message de confirmation (caché par défaut) -->
            <div id="confirmation" class="confirmation">
                ✅ Merci ! Votre message a bien été envoyé !
            </div>

            <button onclick="envoyerMessage()">📩 Envoyer le message</button>
        </div>
    </div>
